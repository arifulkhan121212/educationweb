<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Students Club - Rajbari</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(to bottom,#000,#001f3f);
    color:#fff;
}

/* HEADER */
header{
    display:flex;
    align-items:center;
    gap:15px;
    padding:15px 20px;
    background:#000;
}

header img{
    width:55px;
    height:55px;
    border-radius:50%;
    object-fit:cover;
}

header h2{
    font-size:22px;
}
header p{
    font-size:14px;
    opacity:0.8;
}

/* NAV */
nav{
    background:#000;
    text-align:center;
    padding:12px;
}
nav a{
    color:#fff;
    margin:0 12px;
    text-decoration:none;
    font-weight:bold;
    font-size:15px;
}
nav a:hover{
    color:#3fa9f5;
    border-bottom:2px solid #3fa9f5;
    padding-bottom:4px;
}

/* SLIDER */
.slider{
    width:100%;
    height:220px;
    overflow:hidden;
}
.slider img{
    width:100%;
    height:220px;
    object-fit:cover;
    animation:slide 12s infinite;
}

@keyframes slide{
    0%{opacity:1}
    33%{opacity:0}
    66%{opacity:1}
}

/* SECTION */
.section{
    padding:60px 15px;
    text-align:center;
}
.box{
    background:linear-gradient(to right,#001f3f,#003366);
    margin:20px auto;
    border-radius:12px;
    padding:35px 20px;
    max-width:900px;
}

h2{margin-bottom:12px;color:#e6f2ff;}
p,li{color:#d9e9ff;line-height:1.8;}

button{
    padding:12px 30px;
    background:#1e90ff;
    border:none;
    color:#fff;
    font-size:16px;
    border-radius:25px;
    cursor:pointer;
}
button:hover{background:#3fa9f5;}

ul{list-style:none;}
ul li::before{content:"• ";color:#3fa9f5;}

/* FORM MODAL */
.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    align-items:center;
    justify-content:center;
    z-index:10;
}
.modal-content{
    background:#001f3f;
    padding:25px;
    border-radius:12px;
    width:90%;
    max-width:320px;
    text-align:center;
}
input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:6px;
}

/* ADMIN */
.admin-box{
    background:#000;
    margin:20px auto;
    border-radius:12px;
    padding:25px;
    max-width:900px;
    text-align:left;
}

/* FOOTER */
footer{
    background:#000;
    text-align:center;
    padding:15px;
    opacity:0.7;
    font-size:14px;
}

/* RESPONSIVE */
@media(max-width:600px){
    nav a{
        display:inline-block;
        margin:8px;
    }
    header h2{
        font-size:18px;
    }
}
</style>
</head>

<body>

<header>
    <!-- 🔴 এখানে শুধু logo.png change করলেই হবে -->
    <img src="logo.jpg" alt="Club Logo">
    <div>
        <h2>Students Club</h2>
        <p>Rajbari</p>
    </div>
</header>

<nav>
    <a href="l.html">Home</a>
    <a href="k.html">About</a>
    <a href="1.html">Activities</a>
    <a href="a.html">Admin</a>
    <a href="aa.html">Contact</a>
</nav>

<!-- SLIDER -->
<div class="slider">
    <div class="slide active">
        <img src="h.png">
        <div class="slide-text">Students Club</div>
    </div>
    <div class="slide">
        <img src="slide2.jpg">
        <div class="slide-text">Learning • Skills • Unity</div>
    </div>
   </div>

</slaider>


<section id="home" class="section">
    <h2>STUDENTS CLUB</h2>
    <p>Learning • Skills • Unity</p><br>
    <button onclick="openForm()">Join Us</button>
</section>



<footer>
©Creat by Arif & Labib From Rajbari

</footer>

<!-- FORM -->
<div class="modal" id="joinForm">
    <div class="modal-content">
        <h2>Join Students Club</h2>
        <input id="name" placeholder="Your Name">
        <input id="class" placeholder="Class">
        <input id="phone" placeholder="Phone Number">
        <button onclick="submitForm()">Submit</button><br><br>
        <button onclick="closeForm()">Close</button>
    </div>
</div>

<script>
function openForm(){
    document.getElementById("joinForm").style.display="flex";
}
function closeForm(){
    document.getElementById("joinForm").style.display="none";
}
function submitForm(){
    let name=name=document.getElementById("name").value;
    let cls=document.getElementById("class").value;
    let phone=document.getElementById("phone").value;

    document.getElementById("adminData").innerHTML =
        "Name: "+name+"<br>Class: "+cls+"<br>Phone: "+phone;

    alert("Thank you "+name+"!");
    closeForm();
}
</script>

</body>
</html>
